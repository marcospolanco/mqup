<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=390, height=844">
  <title>MQUP Screenshot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
      background: #1c1c1e;
      display: flex;
      justify-content: center;
      padding: 24px;
    }
    .phone {
      width: 390px;
      height: 844px;
      background: #f2f2f7;
      border-radius: 44px;
      overflow: hidden;
      box-shadow: 0 24px 80px rgba(0,0,0,.45);
      border: 10px solid #111;
      position: relative;
    }
    .status {
      height: 54px;
      display: flex;
      align-items: end;
      justify-content: space-between;
      padding: 0 28px 8px;
      font-size: 15px;
      font-weight: 600;
    }
    .nav {
      text-align: center;
      font-size: 17px;
      font-weight: 600;
      padding: 8px 0 12px;
    }
    .search-row {
      display: flex;
      gap: 8px;
      padding: 0 16px 12px;
    }
    .search-row input {
      flex: 1;
      min-width: 0;
      border: none;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      background: white;
      color: #111;
    }
    .search-row button {
      background: #007aff;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 15px;
      font-weight: 600;
    }
    .headline {
      padding: 0 16px 12px;
      font-size: 17px;
      font-weight: 600;
      line-height: 1.3;
    }
    .map {
      margin: 0 16px 12px;
      height: 220px;
      border-radius: 12px;
      overflow: hidden;
      background: linear-gradient(160deg, #c8e6c9 0%, #a5d6a7 35%, #81c784 60%, #66bb6a 100%);
      position: relative;
    }
    .map::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, transparent 49%, rgba(255,255,255,.35) 50%, transparent 51%),
        linear-gradient(transparent 49%, rgba(255,255,255,.35) 50%, transparent 51%);
      background-size: 48px 48px;
      opacity: .35;
    }
    .pin {
      position: absolute;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid white;
      box-shadow: 0 2px 6px rgba(0,0,0,.25);
    }
    .pin.red { background: #ff3b30; top: 92px; left: 118px; }
    .pin.blue { background: #007aff; top: 128px; left: 178px; }
    .pin.blue2 { background: #007aff; top: 74px; left: 248px; }
    .list {
      background: white;
      margin: 0;
      padding: 0 16px;
    }
    .row {
      padding: 14px 0;
      border-bottom: 1px solid #e5e5ea;
    }
    .row-top {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 12px;
    }
    .name { font-size: 17px; font-weight: 600; margin-bottom: 4px; }
    .why { font-size: 15px; color: #636366; line-height: 1.35; }
    .go {
      background: #007aff;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 15px;
      font-weight: 600;
      flex-shrink: 0;
    }
    .why-link {
      margin-top: 8px;
      font-size: 13px;
      color: #007aff;
      background: none;
      border: none;
      padding: 0;
    }
    .home-indicator {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 134px;
      height: 5px;
      background: #111;
      border-radius: 3px;
      opacity: .18;
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="status"><span>9:41</span><span>●●●</span></div>
    <div class="nav">MQUP</div>
    <div class="search-row">
      <input value="coffee shops with parking open now" readonly>
      <button>Search</button>
    </div>
    <div class="headline">Places that match coffee, parking, and open now</div>
    <div class="map">
      <span class="pin red"></span>
      <span class="pin blue"></span>
      <span class="pin blue2"></span>
    </div>
    <div class="list">
      <div class="row">
        <div class="row-top">
          <div>
            <div class="name">Coupa #318</div>
            <div class="why">Matches coffee, parking, and open now</div>
          </div>
          <button class="go">Go</button>
        </div>
        <button class="why-link">Why this result?</button>
      </div>
      <div class="row">
        <div class="row-top">
          <div>
            <div class="name">Parking Perk Cafe</div>
            <div class="why">Matches coffee, parking, and open now</div>
          </div>
          <button class="go">Go</button>
        </div>
        <button class="why-link">Why this result?</button>
      </div>
      <div class="row">
        <div class="row-top">
          <div>
            <div class="name">Philz #435</div>
            <div class="why">Matches coffee, parking, and open now</div>
          </div>
          <button class="go">Go</button>
        </div>
        <button class="why-link">Why this result?</button>
      </div>
    </div>
    <div class="home-indicator"></div>
  </div>
</body>
</html>
